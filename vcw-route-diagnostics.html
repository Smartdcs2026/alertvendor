<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VCW R14F Route Diagnostics | Alert Vendor</title>
  <style>
    body{margin:0;background:#f1f5f9;color:#0f172a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{max-width:1100px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #dbe4ef;border-radius:22px;box-shadow:0 14px 32px rgba(15,23,42,.08);padding:16px;margin:14px 0}
    h1{margin:0 0 6px;font-size:28px}.muted{color:#64748b}
    .grid{display:grid;grid-template-columns:1fr 140px 120px;gap:10px;align-items:end}
    label{display:block;color:#475569;font-size:12px;font-weight:900}
    input{width:100%;min-height:38px;border:1px solid #cbd5e1;border-radius:12px;padding:0 10px;font-weight:800;box-sizing:border-box}
    button{min-height:38px;border:0;border-radius:12px;background:#0f3d5e;color:#fff;font-weight:950;cursor:pointer}
    pre{white-space:pre-wrap;max-height:680px;overflow:auto;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;font-size:12px}
    .ok{color:#166534;background:#dcfce7;border-radius:999px;padding:4px 10px;font-weight:900}
    .bad{color:#991b1b;background:#fee2e2;border-radius:999px;padding:4px 10px;font-weight:900}
    .warn{color:#92400e;background:#fef3c7;border-radius:999px;padding:4px 10px;font-weight:900}
    @media(max-width:720px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main>
  <section class="card">
    <p class="muted">VCW-R14F</p>
    <h1>Workflow Route Diagnostics</h1>
    <p class="muted">ตรวจ Backend Sync: Worker / Api.gs / ApiBridge / Client ให้ตรงรุ่น R14F</p>
  </section>

  <section class="card">
    <div class="grid">
      <div>
        <label>API Base</label>
        <input id="apiBase" value="https://alertvendor.somchaibutphon.workers.dev">
      </div>
      <div>
        <label>Module</label>
        <input id="moduleId" value="vendors">
      </div>
      <button id="runBtn">Run Test</button>
    </div>
  </section>

  <section class="card">
    <div id="status" class="muted">พร้อมตรวจสอบ</div>
    <pre id="output">-</pre>
  </section>
</main>

<script src="./vcw-workflow-api.js?v=R14F"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  $('runBtn').addEventListener('click', run);

  async function run(){
    const api = window.VCWWorkflowAPI || window.VCWWorkflowApi;
    const moduleId = $('moduleId').value.trim() || 'vendors';

    const out = {
      build: 'VCW-R14F',
      apiVersion: api && api.version ? api.version : '',
      tokenInfo: api && api.getTokenInfo ? api.getTokenInfo() : null,
      checks: {}
    };

    setStatus('กำลังตรวจสอบ routes...', '');

    if(!api){
      setStatus('FAIL: ไม่พบ vcw-workflow-api.js', 'bad');
      $('output').textContent = JSON.stringify(out, null, 2);
      return;
    }

    out.checks.health = await safe(() => api.health());
    out.checks.me = await safe(() => api.me());
    out.checks.dashboard = await safe(() => api.workflowDashboard(moduleId, {limit:5}));
    out.checks.sla = await safe(() => api.slaAlerts(moduleId, {limit:5}));
    out.checks.report = await safe(() => api.workflowReport ? api.workflowReport(moduleId, {date: todayIso(), limit:5}) : Promise.resolve({success:false,code:'NO_CLIENT_METHOD',message:'ไม่มี workflowReport()'}));
    out.checks.gateOutPreview = await safe(() => api.previewGateOutBatch ? api.previewGateOutBatch(moduleId, {limit:5}) : Promise.resolve({success:false,code:'NO_CLIENT_METHOD',message:'ไม่มี previewGateOutBatch()'}));

    out.versionExpected = {
      clientContains: 'VCW-R14F',
      workerContains: 'vcw-r14f-backend-sync-routes-r13',
      apiContains: 'vcw-r14f-api-routes-r13'
    };

    const failed = Object.keys(out.checks).filter(k => !out.checks[k] || out.checks[k].success === false);
    const workerBuild = (((out.checks.health || {}).data || {}).worker || {}).buildVersion || '';
    const apiVersion = (((out.checks.health || {}).data || {}).appsScript || {}).apiVersion || '';
    const versionOk = workerBuild.indexOf('r14f') !== -1 && apiVersion.indexOf('r14f') !== -1;

    if (failed.length) {
      setStatus('พบ route ที่ยังไม่ผ่าน: ' + failed.join(', '), 'bad');
    } else if (!versionOk) {
      setStatus('Route ผ่าน แต่ Version ยังไม่ใช่ R14F ให้ตรวจว่า Deploy ล่าสุดจริงหรือไม่', 'warn');
    } else {
      setStatus('PASS: Backend Sync R14F ผ่าน', 'ok');
    }

    $('output').textContent = JSON.stringify(out, null, 2);
  }

  async function safe(fn){
    try { return await fn(); }
    catch(e){ return {success:false,code:'EXCEPTION',message:e && e.message ? e.message : String(e)}; }
  }

  function todayIso(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function setStatus(text, cls){
    $('status').innerHTML = '<span class="'+(cls||'')+'">'+escapeHtml(text)+'</span>';
  }

  function escapeHtml(v){
    return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
  }
})();
</script>
  <script src="./vcw-auth-persistence-hotfix.js?v=R14G"></script>
<script src="./vcw-auth-persistence-hotfix.js?v=R14G"></script>
<script src="./vcw-workflow-api.js?v=R14F"></script>
</body>
</html>
