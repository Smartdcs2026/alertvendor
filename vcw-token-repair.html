<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VCW Token Repair | Alert Vendor</title>
  <style>
    body{margin:0;background:#f1f5f9;color:#0f172a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{max-width:980px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #dbe4ef;border-radius:22px;box-shadow:0 14px 32px rgba(15,23,42,.08);padding:16px;margin:14px 0}
    h1{margin:0 0 6px;font-size:28px}.muted{color:#64748b}
    button,a.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;border:0;border-radius:12px;background:#0f3d5e;color:#fff;font-weight:950;cursor:pointer;padding:0 14px;text-decoration:none;margin:4px}
    button.secondary,a.secondary{background:#64748b}
    pre{white-space:pre-wrap;max-height:480px;overflow:auto;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;font-size:12px}
    .ok{color:#166534;background:#dcfce7;border-radius:999px;padding:4px 10px;font-weight:900}
    .bad{color:#991b1b;background:#fee2e2;border-radius:999px;padding:4px 10px;font-weight:900}
    .warn{color:#92400e;background:#fef3c7;border-radius:999px;padding:4px 10px;font-weight:900}
  </style>
</head>
<body>
<main>
  <section class="card">
    <p class="muted">VCW-R14G</p>
    <h1>Token Repair</h1>
    <p class="muted">ใช้ซ่อมปัญหา AUTH_REQUIRED กรณี token หายจาก browser storage</p>
  </section>

  <section class="card">
    <button id="checkBtn">Check Token</button>
    <button id="repairBtn">Repair From Storage</button>
    <button id="clearBtn" class="secondary">Clear Token</button>
    <a class="btn" href="./login.html?v=R14G">ไปหน้า Login</a>
    <a class="btn secondary" href="./vcw-route-diagnostics.html?v=R14G&t=1">Route Diagnostics</a>
  </section>

  <section class="card">
    <div id="status" class="muted">พร้อมตรวจ</div>
    <pre id="output">-</pre>
  </section>
</main>

<script src="./vcw-auth-persistence-hotfix.js?v=R14G"></script>
<script src="./vcw-workflow-api.js?v=R14F"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);

  $('checkBtn').addEventListener('click', check);
  $('repairBtn').addEventListener('click', repair);
  $('clearBtn').addEventListener('click', clearToken);

  check();

  function check(){
    const auth = window.VCWAuthPersistence;
    const api = window.VCWWorkflowAPI || window.VCWWorkflowApi;

    const out = {
      build: 'VCW-R14G',
      authPersistence: auth ? auth.version : 'not loaded',
      apiVersion: api && api.version ? api.version : '',
      tokenInfo: auth ? auth.getTokenInfo() : null,
      apiTokenInfo: api && api.getTokenInfo ? api.getTokenInfo() : null
    };

    setStatus(
      out.tokenInfo && out.tokenInfo.hasToken
        ? 'Token OK'
        : 'ไม่พบ Token — ให้ไปหน้า Login แล้ว Login ใหม่',
      out.tokenInfo && out.tokenInfo.hasToken ? 'ok' : 'bad'
    );

    $('output').textContent = JSON.stringify(out, null, 2);
  }

  function repair(){
    const auth = window.VCWAuthPersistence;
    const ok = auth ? auth.repair() : false;
    check();
    if(!ok){
      setStatus('Repair ไม่พบ token เดิม ต้อง Login ใหม่', 'warn');
    }
  }

  function clearToken(){
    const auth = window.VCWAuthPersistence;
    if(!confirm('ลบ token ใน browser storage หรือไม่?')) return;
    if(auth) auth.clearToken();
    check();
  }

  function setStatus(text, cls){
    $('status').innerHTML = '<span class="'+(cls||'')+'">'+escapeHtml(text)+'</span>';
  }

  function escapeHtml(v){
    return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
  }
})();
</script>
</body>
</html>
