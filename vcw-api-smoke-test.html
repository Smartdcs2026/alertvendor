<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VCW-R07A Workflow API Smoke Test</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 16px; background: #f6f7fb; color: #101828; }
    main { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 18px; box-shadow: 0 10px 30px rgba(16,24,40,.08); }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { line-height: 1.6; }
    label { display: block; font-size: 13px; font-weight: 700; margin-top: 14px; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #d0d5dd; border-radius: 12px; padding: 12px 14px; font-size: 16px; margin-top: 6px; background: #fff; }
    textarea { min-height: 72px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    .actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
    button { border: 0; border-radius: 12px; padding: 12px 14px; font-size: 15px; font-weight: 700; background: #101828; color: #fff; cursor: pointer; }
    button.secondary { background: #344054; }
    button.ghost { background: #eef2f6; color: #101828; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1220; color: #d1e9ff; border-radius: 14px; padding: 14px; min-height: 170px; overflow: auto; }
    .note { background: #fffaeb; border: 1px solid #fedf89; border-radius: 14px; padding: 12px; font-size: 14px; }
    .status { border-radius: 14px; padding: 12px; margin-top: 12px; font-weight: 700; }
    .ok { background: #ecfdf3; color: #027a48; border: 1px solid #abefc6; }
    .bad { background: #fef3f2; color: #b42318; border: 1px solid #fecdca; }
    .muted { color: #667085; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <h1>VCW-R07A Workflow API Smoke Test</h1>
    <p class="note">
      เวอร์ชันนี้แก้การอ่าน Token จากระบบเดิมของ Alert Vendor แล้ว โดยรองรับ key: <b>alertvendor_access_token</b>
    </p>

    <div id="tokenStatus" class="status bad">กำลังตรวจ Session...</div>
    <p class="muted" id="tokenHint"></p>

    <label for="apiBase">API Base</label>
    <input id="apiBase" value="https://alertvendor.somchaibutphon.workers.dev">

    <label for="moduleId">Module ID</label>
    <input id="moduleId" value="vendors">

    <label for="entryCode">รหัสเข้าพื้นที่ / Auto ID / QR Code</label>
    <input id="entryCode" placeholder="ใส่ Auto ID จาก Gate In">

    <label for="manualToken">Bearer Token สำรอง ถ้าระบบอ่านจาก sessionStorage ไม่เจอ</label>
    <textarea id="manualToken" placeholder="ปกติไม่ต้องกรอก ช่องนี้ใช้เฉพาะกรณีทดสอบแล้วไม่พบ Session"></textarea>

    <div class="actions">
      <button type="button" id="btnRefresh" class="ghost">ตรวจ Token ใหม่</button>
      <button type="button" id="btnMe" class="secondary">ทดสอบ /api/auth/me</button>
      <button type="button" id="btnLookup">ทดสอบ Lookup</button>
      <button type="button" class="secondary" id="btnState">ทดสอบ State</button>
    </div>

    <h2>ผลลัพธ์</h2>
    <pre id="result">รอทดสอบ...</pre>
  </main>

  <script src="./vcw-workflow-api.js"></script>
  <script>
    const apiBaseInput = document.getElementById('apiBase');
    const moduleIdInput = document.getElementById('moduleId');
    const entryCodeInput = document.getElementById('entryCode');
    const manualTokenInput = document.getElementById('manualToken');
    const tokenStatusEl = document.getElementById('tokenStatus');
    const tokenHintEl = document.getElementById('tokenHint');
    const resultEl = document.getElementById('result');

    function show(value) {
      resultEl.textContent = typeof value === 'string'
        ? value
        : JSON.stringify(value, null, 2);
    }

    function previewToken(token) {
      if (!token) return '';
      return token.slice(0, 18) + '...' + token.slice(-10);
    }

    function findStoredTokenKey() {
      const keys = [
        'alertvendor_access_token',
        'vehicle_status_access_token',
        'vehicleStatusAccessToken',
        'accessToken',
        'authToken',
        'token',
        'sessionToken',
        'vehicle_status_token'
      ];

      for (const storageName of ['sessionStorage', 'localStorage']) {
        const storage = window[storageName];
        if (!storage) continue;

        for (const key of keys) {
          try {
            const value = String(storage.getItem(key) || '').trim();
            if (value) return storageName + ':' + key;
          } catch (error) {}
        }
      }

      return '';
    }

    function getManualToken() {
      return manualTokenInput.value.trim();
    }

    function refreshTokenStatus() {
      const token = getManualToken() || window.VCWWorkflowApi.getAccessToken();
      const key = findStoredTokenKey();

      if (token) {
        tokenStatusEl.className = 'status ok';
        tokenStatusEl.textContent = 'พบ Bearer Token แล้ว: ' + previewToken(token);
        tokenHintEl.textContent = key ? ('อ่านจาก ' + key) : 'อ่านจาก object/session หรือช่อง Bearer Token สำรอง';
      } else {
        tokenStatusEl.className = 'status bad';
        tokenStatusEl.textContent = 'ยังไม่พบ Bearer Token';
        tokenHintEl.textContent = 'ให้กลับไปหน้า admin.html แล้วกดออกจากระบบ จากนั้น Login ใหม่ แล้วเปิดหน้านี้อีกครั้ง';
      }

      return token;
    }

    function getInput() {
      window.VCWWorkflowApi.configure({
        apiBase: apiBaseInput.value,
        defaultModuleId: moduleIdInput.value
      });

      return {
        moduleId: moduleIdInput.value.trim(),
        entryCode: entryCodeInput.value.trim(),
        accessToken: refreshTokenStatus()
      };
    }

    document.getElementById('btnRefresh').addEventListener('click', () => {
      const token = refreshTokenStatus();
      show({
        success: Boolean(token),
        authenticatedClientSide: Boolean(token),
        tokenPreview: previewToken(token),
        apiVersion: window.VCWWorkflowApi.version,
        config: window.VCWWorkflowApi.getConfig()
      });
    });

    document.getElementById('btnMe').addEventListener('click', async () => {
      try {
        const input = getInput();
        show('กำลังตรวจ /api/auth/me ...');
        const data = await window.VCWWorkflowApi.request('/api/auth/me', {
          method: 'GET',
          accessToken: input.accessToken
        });
        show(data);
      } catch (error) {
        show({ success: false, code: error.code || error.name, message: error.message, status: error.status || 0, details: error.details || {} });
      }
    });

    document.getElementById('btnLookup').addEventListener('click', async () => {
      try {
        const input = getInput();
        show('กำลัง Lookup...');
        const data = await window.VCWWorkflowApi.lookupEntry(input.moduleId, input.entryCode, {
          accessToken: input.accessToken
        });
        show(data);
      } catch (error) {
        show({ success: false, code: error.code || error.name, message: error.message, status: error.status || 0, details: error.details || {} });
      }
    });

    document.getElementById('btnState').addEventListener('click', async () => {
      try {
        const input = getInput();
        show('กำลังอ่าน State...');
        const data = await window.VCWWorkflowApi.getState(input.moduleId, input.entryCode, {
          accessToken: input.accessToken
        });
        show(data);
      } catch (error) {
        show({ success: false, code: error.code || error.name, message: error.message, status: error.status || 0, details: error.details || {} });
      }
    });

    refreshTokenStatus();
  </script>
</body>
</html>
